backend:
  name: github
  repo: sharno/sharno.github.io
  branch: master
  base_url: https://decap-cms-oauth.netlify.app
  auth_endpoint: /.netlify/functions/auth
  site_domain: sharno.github.io

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

site_url: https://sharno.github.io
display_url: https://sharno.github.io

collections:
  - name: "posts"
    label: "Posts"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
