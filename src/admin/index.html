<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "sharno/sharno.github.io",
            branch: "master",
            auth_endpoint: "https://decap-cms-oauth.netlify.app/.netlify/functions/auth"
          },
          media_folder: "src/assets/uploads",
          public_folder: "/assets/uploads",
          site_url: "https://sharno.github.io",
          display_url: "https://sharno.github.io",
          collections: [
            {
              name: "posts",
              label: "Posts",
              folder: "src/posts",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Publish Date", name: "date", widget: "datetime" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
