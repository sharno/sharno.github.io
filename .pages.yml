media:
  input: src/assets/uploads
  output: /assets/uploads

content:
  - name: posts
    label: Posts
    type: collection
    path: src/posts
    filename: "{primary}.md"
    view:
      fields: [title, date, tags]
      primary: title
      sort: [date, desc]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Publish Date
        type: date
        options:
          format: yyyy-MM-dd
        required: true
      - name: tags
        label: Tags
        type: string
        list: true
      - name: body
        label: Body
        type: rich-text

  - name: about
    label: About Page
    type: file
    path: src/about/index.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: body
        label: Body
        type: rich-text
